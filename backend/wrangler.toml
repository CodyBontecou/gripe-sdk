name = "gripe-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

routes = [
  { pattern = "gripe.isolated.tech", custom_domain = true }
]

[[r2_buckets]]
binding = "GRIPE_IMAGES"
bucket_name = "gripe-images"

# Public env vars. Secrets (GRIPE_API_KEY, GITHUB_TOKEN) go through:
#   wrangler secret put GRIPE_API_KEY
#   wrangler secret put GITHUB_TOKEN
# GITHUB_REPO is now per-request (sent by SDK as `repository` form field).
[vars]
R2_PUBLIC_BASE = "https://gripe.isolated.tech/images"
