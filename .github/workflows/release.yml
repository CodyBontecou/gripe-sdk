name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  test:
    name: Verify tag (iOS Simulator Tests)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Resolve simulator
        id: sim
        run: |
          set -euo pipefail
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; d=json.load(sys.stdin); \
              ids=[dev['udid'] for runtime,devs in d['devices'].items() if 'iOS' in runtime \
                   for dev in devs if dev.get('isAvailable') and 'iPhone' in dev['name']]; \
              print(ids[0] if ids else '')")
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme GripeSDK \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            CODE_SIGNING_ALLOWED=NO

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF##*/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; skipping creation."
            exit 0
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
