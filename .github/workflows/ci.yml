name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: iOS Simulator Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve simulator
        id: sim
        run: |
          set -euo pipefail
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; d=json.load(sys.stdin); \
              ids=[dev['udid'] for runtime,devs in d['devices'].items() if 'iOS' in runtime \
                   for dev in devs if dev.get('isAvailable') and 'iPhone' in dev['name']]; \
              print(ids[0] if ids else '')")
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iPhone simulator found" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE_ID"

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme GripeSDK \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload result bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
